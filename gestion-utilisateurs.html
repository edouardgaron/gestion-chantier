<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestion des utilisateurs — InnovaSpray Québec</title>
  <script src="webhooks.config.js"></script>
  <script src="isq-storage.js"></script>
  <script src="isq-auth.js"></script>
  <script>ISQAuth.requireAdmin();</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bleu:   #0170B9;
      --orange: #FF6600;
      --vert:   #2E7D32;
      --rouge:  #C62828;
      --gris:   #F4F6F9;
      --bordure:#D0D7E3;
      --texte:  #1A1A2E;
    }
    body {
      font-family: 'Montserrat', 'Segoe UI', Arial, sans-serif;
      background: #F0F4F8;
      color: var(--texte);
      font-size: 14px;
      line-height: 1.5;
    }

    .navbar {
      background: var(--bleu);
      color: #fff;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 2px 12px rgba(1,112,185,.25);
    }
    .navbar a {
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.35);
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 700;
      transition: background .2s;
    }
    .navbar a:hover { background: rgba(255,255,255,.28); }
    .navbar-title { font-size: 17px; font-weight: 800; }

    .main { max-width: 820px; margin: 0 auto; padding: 24px 16px 48px; }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(1,112,185,.10);
      margin-bottom: 24px;
      overflow: hidden;
    }
    .card-header {
      background: var(--bleu);
      color: #fff;
      padding: 14px 20px;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .8px;
    }
    .card-body { padding: 20px; }

    /* TABLEAU UTILISATEURS */
    .user-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .user-table th {
      background: var(--gris);
      border-bottom: 2px solid var(--bordure);
      padding: 10px 12px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: #666;
    }
    .user-table td {
      border-bottom: 1px solid var(--bordure);
      padding: 12px 12px;
      vertical-align: middle;
    }
    .user-table tr:last-child td { border-bottom: none; }
    .user-table tr:hover td { background: #f8fafd; }

    .role-badge {
      display: inline-block;
      border-radius: 99px;
      padding: 2px 10px;
      font-size: 11px;
      font-weight: 700;
    }
    .role-badge.admin   { background: #0170B9; color: #fff; }
    .role-badge.employe { background: #FF6600; color: #fff; }

    .btn-sm {
      padding: 5px 12px;
      border-radius: 5px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      border: none;
      transition: background .15s, color .15s;
    }
    .btn-edit   { background: #e8f4fd; color: #0170B9; border: 1.5px solid #b3d9f5; }
    .btn-edit:hover { background: #0170B9; color: #fff; border-color: #0170B9; }
    .btn-delete { background: #fdf3f2; color: #C62828; border: 1.5px solid #f5b7b1; margin-left: 6px; }
    .btn-delete:hover { background: #C62828; color: #fff; border-color: #C62828; }

    .no-users { padding: 20px; text-align: center; color: #999; font-size: 13px; }

    /* FORMULAIRE */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: #666;
    }
    .form-group input,
    .form-group select {
      border: 1.5px solid var(--bordure);
      border-radius: 7px;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 14px;
      color: var(--texte);
      background: var(--gris);
      transition: border-color .2s, background .2s;
      min-height: 44px;
    }
    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--bleu);
      background: #fff;
    }
    .form-group.full { grid-column: 1 / -1; }
    .form-hint {
      font-size: 11px;
      color: #999;
      margin-top: 2px;
    }

    .btn-primary {
      padding: 12px 24px;
      background: var(--orange);
      color: #fff;
      border: none;
      border-radius: 7px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s;
      min-height: 46px;
    }
    .btn-primary:hover { background: #cc5200; }
    .btn-primary:disabled { background: #ccc; cursor: default; }

    .btn-cancel {
      padding: 12px 24px;
      background: #f0f0f0;
      color: #555;
      border: none;
      border-radius: 7px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-left: 10px;
    }
    .btn-cancel:hover { background: #e0e0e0; }

    .form-actions { margin-top: 18px; display: flex; align-items: center; gap: 0; }

    .alert {
      border-radius: 7px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 700;
      margin-top: 14px;
      display: none;
    }
    .alert.show { display: block; }
    .alert.success { background: #e8f5e9; border: 1.5px solid #a5d6a7; color: #2E7D32; }
    .alert.error   { background: #fdf3f2; border: 1.5px solid #f5b7b1; color: #C62828; }

    .form-mode-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--bleu);
      padding: 0 0 14px 0;
      margin-bottom: 14px;
      border-bottom: 2px solid var(--bordure);
    }
    .form-mode-label.editing { color: #e67e22; }

    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-group.full { grid-column: 1; }
      .main { padding: 16px 12px 32px; }
    }
  </style>
</head>
<body>

<div class="navbar">
  <a href="index.html">← Accueil</a>
  <span class="navbar-title">Gestion des utilisateurs</span>
</div>

<div class="main">

  <!-- LISTE DES UTILISATEURS -->
  <div class="card">
    <div class="card-header">Utilisateurs existants</div>
    <div class="card-body" style="padding:0;">
      <div id="userListContainer">
        <div class="no-users">Chargement…</div>
      </div>
    </div>
  </div>

  <!-- FORMULAIRE AJOUT / MODIFICATION -->
  <div class="card">
    <div class="card-header" id="formCardTitle">Ajouter un utilisateur</div>
    <div class="card-body">
      <div class="form-mode-label" id="formModeLabel">Nouveau compte</div>
      <form id="userForm" onsubmit="handleFormSubmit(event)">
        <input type="hidden" id="editUserId">
        <div class="form-grid">
          <div class="form-group">
            <label for="fNom">Nom complet</label>
            <input type="text" id="fNom" placeholder="ex: Marc Bouchard" required>
          </div>
          <div class="form-group">
            <label for="fUsername">Nom d'utilisateur</label>
            <input type="text" id="fUsername" placeholder="ex: marc.bouchard" required
                   autocomplete="off">
          </div>
          <div class="form-group">
            <label for="fPassword">Mot de passe</label>
            <input type="password" id="fPassword" placeholder="••••••••"
                   autocomplete="new-password">
            <span class="form-hint" id="pwdHint">Minimum 6 caractères</span>
          </div>
          <div class="form-group">
            <label for="fRole">Rôle</label>
            <select id="fRole">
              <option value="employe">Employé</option>
              <option value="admin">Administrateur</option>
            </select>
          </div>
        </div>
        <div class="alert" id="formAlert"></div>
        <div class="form-actions">
          <button class="btn-primary" type="submit" id="btnSubmit">Ajouter l'utilisateur</button>
          <button class="btn-cancel" type="button" id="btnCancelEdit"
                  onclick="cancelEdit()" style="display:none;">Annuler</button>
        </div>
      </form>
    </div>
  </div>

</div>

<script>
var IS_EDITING = false;

function renderUserList() {
  var users     = ISQAuth.getUsers();
  var session   = ISQAuth.getSession();
  var container = document.getElementById('userListContainer');

  if (!users.length) {
    container.innerHTML = '<div class="no-users">Aucun utilisateur.</div>';
    return;
  }

  var rows = users.map(function (u) {
    var roleClass = u.role === 'admin' ? 'admin' : 'employe';
    var roleLabel = u.role === 'admin' ? 'Admin' : 'Employé';
    var isSelf    = session && session.id === u.id;
    var deleteBtn = isSelf
      ? '<button class="btn-sm btn-delete" disabled title="Vous ne pouvez pas supprimer votre propre compte" style="opacity:.4;cursor:default;">Supprimer</button>'
      : '<button class="btn-sm btn-delete" onclick="confirmDelete(\'' + u.id + '\', \'' + _esc(u.nom) + '\')">Supprimer</button>';
    return '<tr>' +
      '<td><strong>' + _esc(u.nom) + '</strong>' + (isSelf ? ' <span style="font-size:11px;color:#999;">(vous)</span>' : '') + '</td>' +
      '<td style="color:#666;">' + _esc(u.username) + '</td>' +
      '<td><span class="role-badge ' + roleClass + '">' + roleLabel + '</span></td>' +
      '<td><button class="btn-sm btn-edit" onclick="startEdit(\'' + u.id + '\')">Modifier</button>' + deleteBtn + '</td>' +
    '</tr>';
  }).join('');

  container.innerHTML =
    '<table class="user-table">' +
      '<thead><tr><th>Nom</th><th>Identifiant</th><th>Rôle</th><th>Actions</th></tr></thead>' +
      '<tbody>' + rows + '</tbody>' +
    '</table>';
}

function startEdit(id) {
  var users = ISQAuth.getUsers();
  var user  = users.find(function (u) { return u.id === id; });
  if (!user) return;

  IS_EDITING = true;
  document.getElementById('editUserId').value  = user.id;
  document.getElementById('fNom').value        = user.nom;
  document.getElementById('fUsername').value   = user.username;
  document.getElementById('fPassword').value   = '';
  document.getElementById('fRole').value       = user.role;

  document.getElementById('pwdHint').textContent     = 'Laisser vide pour conserver le mot de passe actuel';
  document.getElementById('formCardTitle').textContent = 'Modifier un utilisateur';
  document.getElementById('formModeLabel').textContent = 'Modification de : ' + user.nom;
  document.getElementById('formModeLabel').className  = 'form-mode-label editing';
  document.getElementById('btnSubmit').textContent    = 'Enregistrer les modifications';
  document.getElementById('btnCancelEdit').style.display = 'inline-block';

  hideAlert();
  document.getElementById('fNom').focus();
  document.querySelector('.card:last-child').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function cancelEdit() {
  IS_EDITING = false;
  document.getElementById('editUserId').value  = '';
  document.getElementById('userForm').reset();
  document.getElementById('pwdHint').textContent     = 'Minimum 6 caractères';
  document.getElementById('formCardTitle').textContent = 'Ajouter un utilisateur';
  document.getElementById('formModeLabel').textContent = 'Nouveau compte';
  document.getElementById('formModeLabel').className  = 'form-mode-label';
  document.getElementById('btnSubmit').textContent    = 'Ajouter l\'utilisateur';
  document.getElementById('btnCancelEdit').style.display = 'none';
  hideAlert();
}

async function handleFormSubmit(e) {
  e.preventDefault();
  var btn      = document.getElementById('btnSubmit');
  var nom      = document.getElementById('fNom').value.trim();
  var username = document.getElementById('fUsername').value.trim();
  var password = document.getElementById('fPassword').value;
  var role     = document.getElementById('fRole').value;
  var editId   = document.getElementById('editUserId').value;

  if (!nom || !username) { showAlert('Nom et identifiant sont obligatoires.', 'error'); return; }
  if (!IS_EDITING && (!password || password.length < 6)) {
    showAlert('Le mot de passe doit contenir au moins 6 caractères.', 'error'); return;
  }
  if (IS_EDITING && password && password.length < 6) {
    showAlert('Le nouveau mot de passe doit contenir au moins 6 caractères.', 'error'); return;
  }

  btn.disabled    = true;
  btn.textContent = 'Enregistrement…';

  var result;
  if (IS_EDITING) {
    result = await ISQAuth.updateUser(editId, nom, username, password, role);
  } else {
    result = await ISQAuth.createUser(nom, username, password, role);
  }

  btn.disabled = false;
  btn.textContent = IS_EDITING ? 'Enregistrer les modifications' : "Ajouter l'utilisateur";

  if (result.ok) {
    showAlert(IS_EDITING ? 'Utilisateur modifié avec succès.' : 'Utilisateur ajouté avec succès.', 'success');
    cancelEdit();
    renderUserList();
  } else {
    showAlert(result.msg, 'error');
  }
}

function confirmDelete(id, nom) {
  if (!confirm('Supprimer l\'utilisateur "' + nom + '" ?\nCette action est irréversible.')) return;
  var result = ISQAuth.deleteUser(id);
  if (result.ok) {
    renderUserList();
  } else {
    alert('Erreur : ' + result.msg);
  }
}

function showAlert(msg, type) {
  var el = document.getElementById('formAlert');
  el.textContent = msg;
  el.className   = 'alert show ' + type;
}
function hideAlert() {
  var el = document.getElementById('formAlert');
  el.className = 'alert';
}

function _esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.addEventListener('DOMContentLoaded', function () {
  renderUserList();
});
</script>

</body>
</html>
